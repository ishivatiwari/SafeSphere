<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeSphere | Crowd Management</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-effects"></div>
    <main class="dashboard">
        <header>
            <h1>SafeSphere</h1>
            <p>Real-Time Crowd Safety AI Dashboard</p>
        </header>

        <div class="grid-layout">
            <section class="card input-section">
                <h2>Add Zone Data</h2>
                <form id="zoneForm">
                    <div class="input-group">
                        <label>Zone ID</label>
                        <input type="text" id="zoneId" placeholder="e.g. A1" required>
                    </div>
                    <div class="input-group">
                        <label>Density (%)</label>
                        <input type="number" id="density" placeholder="85" max="200" required>
                    </div>
                    <div class="input-group">
                        <label>Movement Speed (m/s)</label>
                        <input type="number" step="0.1" id="speed" placeholder="1.2" required>
                    </div>
                    <button type="submit" id="addZoneBtn">Add Zone</button>
                    <button type="button" id="analyzeBtn" class="analyze-btn">Analyze Safety</button>
                </form>
                
                <div id="addedZones" class="zone-list-preview">
                    <!-- Preview of zones before analyzing -->
                </div>
            </section>

            <section class="results-section">
                <div class="alert-banner" id="alertBanner" style="display: none;"></div>
                
                <div class="card actions-list" id="actionsList" style="display: none; margin-bottom: 1.5rem;">
                    <h3 style="margin-top: 0; color: var(--secondary);">Suggested Actions</h3>
                    <ul id="actionsContainer" style="margin: 0; padding-left: 1.2rem;"></ul>
                </div>

                <div class="status-grid" id="statusGrid">
                    <!-- Zone Cards will dynamically spawn here -->
                    <div class="empty-state card">
                        <p style="text-align: center; color: var(--text-main);">No zones analyzed yet. Add data and click Analyze.</p>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <script src="/static/script.js"></script>
</body>
</html>
